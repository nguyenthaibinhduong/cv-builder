<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description"
        content="Frontend freelancer portfolio and CV: web, mobile, realtime projects with embedded demo preview." />
    <title>NGUYEN THAI BINH DUONG - Frontend Developer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Lexend:wght@500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./styles.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="./cv-data.js"></script>
    <script src="./app.js" defer></script>
</head>

<body>
    <div class="wrap">
        <div class="topbar">
            <div class="muted small">Professional CV Template</div>

            <div class="tabs" role="tablist" aria-label="View switch">
                <button class="tab-btn" id="tab-cv" role="tab" aria-selected="true">CV</button>
                <button class="tab-btn" id="tab-portfolio" role="tab" aria-selected="false">Portfolio</button>
            </div>

            <div class="lang" role="group" aria-label="Language switch">
                <button class="btn" id="btn-en" aria-pressed="true">English</button>
                <button class="btn" id="btn-vi" aria-pressed="false">Tiếng Việt</button>
            </div>

            <button class="exportBtn" id="btn-export">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                </svg>
                Export PDF
            </button>
        </div>

        <div class="card" id="cv-container"></div>
        <div class="card hidden" id="portfolio-container"></div>
    </div>

    <div class="demo-modal hidden" id="demo-modal" aria-hidden="true">
        <div class="demo-backdrop" id="demo-backdrop"></div>
        <div class="demo-shell" role="dialog" aria-modal="true" aria-labelledby="demo-title">
            <div class="demo-head">
                <h3 id="demo-title">Project Demo</h3>
                <div class="demo-actions">
                    <a id="demo-open-new" class="btn-link" target="_blank" rel="noopener">Open in new tab</a>
                    <button class="btn-close" id="demo-close" aria-label="Close demo">Close</button>
                </div>
            </div>
            <div class="demo-frame-wrap">
                <iframe id="demo-frame" title="Project demo preview" loading="lazy"></iframe>
            </div>
            <p class="demo-note" id="demo-note"></p>
        </div>
    </div>
</body>

</html>
